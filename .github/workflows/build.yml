name: Build LGPL ffmpeg for macOS

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: FFmpeg release tag
        required: true
        default: n7.1

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            triple: aarch64-apple-darwin
          - runner: macos-13
            triple: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Install build deps
        run: |
          brew update
          brew install nasm pkg-config

      - name: Clone FFmpeg
        run: git clone --depth 1 -b ${{ inputs.ffmpeg_version }} https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure
        working-directory: ffmpeg-src
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          ./configure \
            --prefix="$PWD/out" \
            --enable-version3 \
            --disable-gpl \
            --disable-nonfree \
            --disable-debug \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages \
            --enable-pic \
            --extra-cflags="-mmacosx-version-min=13.0" \
            --extra-ldflags="-mmacosx-version-min=13.0"

      - name: Build
        working-directory: ffmpeg-src
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Verify deployment target
        working-directory: ffmpeg-src
        run: |
          echo "=== ffmpeg load commands ==="
          otool -l out/bin/ffmpeg | grep -A 3 LC_BUILD_VERSION || otool -l out/bin/ffmpeg | grep -A 3 LC_VERSION_MIN_MACOSX
          echo "=== ffprobe load commands ==="
          otool -l out/bin/ffprobe | grep -A 3 LC_BUILD_VERSION || otool -l out/bin/ffprobe | grep -A 3 LC_VERSION_MIN_MACOSX

      - name: Smoke check
        working-directory: ffmpeg-src
        run: |
          out/bin/ffmpeg -version | head -2
          out/bin/ffprobe -version | head -2

      - name: Rename for Tauri
        working-directory: ffmpeg-src/out/bin
        run: |
          mv ffmpeg ffmpeg-${{ matrix.triple }}
          mv ffprobe ffprobe-${{ matrix.triple }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.triple }}
          path: |
            ffmpeg-src/out/bin/ffmpeg-${{ matrix.triple }}
            ffmpeg-src/out/bin/ffprobe-${{ matrix.triple }}
          retention-days: 30

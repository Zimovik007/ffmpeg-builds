name: Build LGPL ffmpeg for macOS

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: FFmpeg release tag
        required: true
        default: n7.1

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            triple: aarch64-apple-darwin
          - arch: x86_64
            triple: x86_64-apple-darwin
    steps:
      - name: Install build deps
        run: |
          brew update
          brew install nasm pkg-config

      - name: Clone FFmpeg
        run: git clone --depth 1 -b ${{ inputs.ffmpeg_version }} https://github.com/FFmpeg/FFmpeg.git ffmpeg-src

      - name: Configure (${{ matrix.arch }})
        working-directory: ffmpeg-src
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            CROSS_FLAGS=""
          else
            CROSS_FLAGS="--enable-cross-compile --arch=x86_64 --target-os=darwin --cc=clang"
          fi
          ./configure \
            --prefix="$PWD/out" \
            --enable-version3 \
            --disable-gpl \
            --disable-nonfree \
            --disable-debug \
            --disable-doc \
            --disable-htmlpages \
            --disable-manpages \
            --disable-podpages \
            --disable-txtpages \
            --enable-pic \
            --extra-cflags="-arch ${{ matrix.arch }} -mmacosx-version-min=13.0" \
            --extra-ldflags="-arch ${{ matrix.arch }} -mmacosx-version-min=13.0" \
            $CROSS_FLAGS

      - name: Build
        working-directory: ffmpeg-src
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          make -j$(sysctl -n hw.ncpu)
          make install

      - name: Verify architecture and deployment target
        working-directory: ffmpeg-src
        run: |
          echo "=== file info ==="
          file out/bin/ffmpeg
          file out/bin/ffprobe
          echo "=== deployment target (ffmpeg) ==="
          otool -l out/bin/ffmpeg | grep -A 3 LC_BUILD_VERSION || otool -l out/bin/ffmpeg | grep -A 3 LC_VERSION_MIN_MACOSX
          echo "=== deployment target (ffprobe) ==="
          otool -l out/bin/ffprobe | grep -A 3 LC_BUILD_VERSION || otool -l out/bin/ffprobe | grep -A 3 LC_VERSION_MIN_MACOSX

      - name: Smoke check
        working-directory: ffmpeg-src
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            out/bin/ffmpeg -version | head -2
            out/bin/ffprobe -version | head -2
          else
            arch -x86_64 out/bin/ffmpeg -version | head -2
            arch -x86_64 out/bin/ffprobe -version | head -2
          fi

      - name: Rename for Tauri
        working-directory: ffmpeg-src/out/bin
        run: |
          mv ffmpeg ffmpeg-${{ matrix.triple }}
          mv ffprobe ffprobe-${{ matrix.triple }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ matrix.triple }}
          path: |
            ffmpeg-src/out/bin/ffmpeg-${{ matrix.triple }}
            ffmpeg-src/out/bin/ffprobe-${{ matrix.triple }}
          retention-days: 30
